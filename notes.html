<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Notes | WebAcademy</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="side-nav">
      <div class="logo">W<span>A</span></div>
      <div class="nav-icons">
        <a href="index.html" class="icon-circle">🏠</a>
        <div class="icon-circle active">📝</div>
        <a href="settings.html" class="icon-circle">⚙️</a>
      </div>
    </nav>

    <main class="main-content">
      <header class="top-bar">
        <div class="header-text">
          <h1>Learning Notes</h1>
          <p>Your personal space to jot down code snippets and ideas.</p>
        </div>
      </header>

      <section class="notes-area">
        <textarea
          id="user-notes"
          placeholder="Start typing your notes here... (they save automatically!)"
          style="
            width: 100%;
            height: 400px;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
          "
        ></textarea>

        <div
          id="save-status"
          style="
            margin-top: 15px;
            color: #6366f1;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
          "
        >
          ✓ Saved to local storage
        </div>
      </section>
    </main>

    <script>
      const textarea = document.getElementById("user-notes");
      const status = document.getElementById("save-status");

      // Load existing notes
      textarea.value = localStorage.getItem("web_academy_notes") || "";

      // Auto-save on typing
      textarea.addEventListener("input", () => {
        localStorage.setItem("web_academy_notes", textarea.value);

        // Show "Saved" flash
        status.style.opacity = "1";
        setTimeout(() => {
          status.style.opacity = "0";
        }, 1000);
      });
    </script>
  </body>
</html>
